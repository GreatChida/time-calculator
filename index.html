<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>時間課金計算</title>
    <style>
        /* --- 基本リセット & レイアウト --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        .hidden { visibility: hidden; }

        /* --- ボタン共通設定 --- */
        button {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            color: white; -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.95); opacity: 0.9; }
        button:disabled { background: #ccc !important; cursor: not-allowed; }

        .btn-start { background: #4CAF50; }
        .btn-plus  { background: #2196F3; }
        .btn-minus { background: #FF9800; }

        /* --- 情報表示エリア --- */
        .info-row { border-radius: 8px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .info-label { font-size: 12px; font-weight: bold; }
        .info-amount { font-size: 18px; font-weight: bold; font-family: 'Courier New', monospace; }

        /* --- 入力・バッジ・カウントダウン --- */
        /* PCでも確実に入力できるよう、通常のinput[type="time"]として表示 */
        #startTimeInput { 
            border: 1px solid #ccc; border-radius: 4px; padding: 2px 4px; 
            font-weight: bold; color: #000; background: #fff; 
            font-size: 18px; width: 105px; 
        }
        .current-time-text { font-size: 18px; font-weight: bold; color: #000; }
        .header-label { font-size: 14px; font-weight: bold; color: #000; }
        
        .badge { background: #667eea; color: white; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; white-space: nowrap; }
        .countdown { color: #f44336; font-size: 14px; font-weight: bold; margin-left: 8px; }
        
        .error-text { color: #f44336 !important; font-size: 28px !important; }
        .charge-counter { background: white; border-radius: 6px; padding: 6px 10px; min-width: 50px; text-align: center; font-weight: bold; border: 2px solid #e0e0e0; font-size: 16px; margin: 0 4px; }
        
        .charge-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    </style>
</head>
<body style="font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; padding: 10px;">

    <div style="background: white; border-radius: 15px; padding: 15px; max-width: 400px; width: 100%; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);">
        
        <!-- [UI] 開始時間 ～ 現在時間 & n回バッジ -->
        <div id="headerArea" class="hidden" style="background: #f0f0f0; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; border: 1px solid #ddd;">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 6px;">
                    <span class="header-label">開始</span>
                    <!-- inputを隠さず、そのまま表示して操作可能にしました -->
                    <input type="time" id="startTimeInput" oninput="adjustStartTime()">
                    <span class="header-label">～</span>
                    <span id="currentTimeDisplay" class="current-time-text">00:00:00</span>
                </div>
                <span id="cycleBadge" class="badge">1回</span>
            </div>
        </div>

        <!-- [UI] メインタイマー & 残り時間 -->
        <div style="background: #f5f5f5; border-radius: 12px; padding: 10px; text-align: center; margin-bottom: 10px;">
            <div style="display: flex; align-items: center; justify-content: center;">
                <span id="timer" style="font-size: 32px; font-weight: bold; color: #667eea; font-family: 'Courier New', monospace;">00:00:00</span>
                <span id="nextLimit" class="countdown">あと 20:00</span>
            </div>
        </div>

        <!-- [UI] 操作ボタン -->
        <div style="display: flex; gap: 8px; margin-bottom: 10px;">
            <button class="btn-start" id="startBtn" onclick="startTimer()">開始</button>
        </div>

        <!-- [UI] 手動課金セクション -->
        <div style="background: #f9f9f9; border-radius: 12px; padding: 10px; margin-bottom: 10px;">
            <div class="charge-row"><button class="btn-plus" onclick="updateManualCharge(600)">🥤 600円 +</button><div id="count600" class="charge-counter">0</div><button class="btn-minus" onclick="updateManualCharge(-600)">600円 -</button></div>
            <div class="charge-row"><button class="btn-plus" onclick="updateManualCharge(800)">🍚 800円 +</button><div id="count800" class="charge-counter">0</div><button class="btn-minus" onclick="updateManualCharge(-800)">800円 -</button></div>
            <div class="charge-row"><button class="btn-plus" onclick="updateManualCharge(1200)">1200円 +</button><div id="count1200" class="charge-counter">0</div><button class="btn-minus" onclick="updateManualCharge(-1200)">1200円 -</button></div>
            <div class="charge-row"><button class="btn-plus" onclick="updateManualCharge(2000)">📷 2000円 +</button><div id="count2000" class="charge-counter">0</div><button class="btn-minus" onclick="updateManualCharge(-2000)">2000円 -</button></div>
        </div>

        <!-- [UI] 金額表示 -->
        <div class="info-row" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
            <span class="info-label">合計金額(税込)</span>
            <span class="info-amount" id="totalAmount">¥0</span>
        </div>
        <div class="info-row" style="background: #fff3cd; border: 2px solid #ffc107;">
            <span class="info-label" style="color: #856404;">💡 次の時間</span>
            <span class="info-amount" id="predictionAmount" style="color: #856404;">¥0</span>
        </div>
    </div>

    <script>
        let timerInterval = null, baseStartTime = null;
        let counts = { 600: 0, 800: 0, 1200: 0, 2000: 0 };
        let currentAutoCharge = 800;
        const BASE_CHARGE = 800, CYCLE_MINS = 20;

        /** 24時〜33時表記用の文字列生成 */
        function formatExtendedTime(date) {
            let h = date.getHours();
            const m = String(date.getMinutes()).padStart(2, '0');
            const s = String(date.getSeconds()).padStart(2, '0');
            if (h < 10) h += 24; // 0-9時を24-33時として扱う
            return `${h}:${m}:${s}`;
        }

        /** タイマーを開始する */
        function startTimer() {
            if (timerInterval) return;
            const now = new Date();
            
            // 入力欄に初期値をセット（標準のHH:MM形式）
            document.getElementById('startTimeInput').value = 
                now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            
            document.getElementById('headerArea').classList.remove('hidden');
            baseStartTime = now;
            timerInterval = setInterval(refreshDisplay, 500);
            document.getElementById('startBtn').disabled = true;
            refreshDisplay();
        }

        /** 開始時刻調整（入力された瞬間に即時計算） */
        function adjustStartTime() {
            const timeVal = document.getElementById('startTimeInput').value;
            if (!timeVal) return;
            
            const [h, m] = timeVal.split(':').map(Number);
            const now = new Date();
            let newStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
            
            // もし未来の時刻なら前日分とみなす（深夜跨ぎ対応）
            if (newStart > now) {
                newStart.setDate(newStart.getDate() - 1);
            }

            baseStartTime = newStart;
            refreshDisplay();
        }

        /** 画面表示の更新 */
        function refreshDisplay() {
            const now = new Date();
            // 現在時刻を34時間制で表示
            document.getElementById('currentTimeDisplay').textContent = formatExtendedTime(now);

            if (!baseStartTime) return;
            const diffSec = Math.floor((now.getTime() - baseStartTime.getTime()) / 1000);
            const timerEl = document.getElementById('timer');

            // 未来時刻（エラー）
            if (diffSec < 0) {
                timerEl.textContent = "エラー";
                timerEl.classList.add('error-text');
                document.getElementById('nextLimit').textContent = "---";
                document.getElementById('cycleBadge').textContent = "待機中";
                calculateAndDisplay();
                return;
            }

            timerEl.classList.remove('error-text');
            const h = Math.floor(diffSec / 3600), m = Math.floor((diffSec % 3600) / 60), s = diffSec % 60;
            timerEl.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            
            const elapsedMinsTotal = Math.floor(diffSec / 60);
            const cycles = Math.floor(elapsedMinsTotal / CYCLE_MINS);
            document.getElementById('cycleBadge').textContent = (cycles + 1) + '回';
            currentAutoCharge = BASE_CHARGE + (cycles * 800);
            
            const remainSec = (cycles + 1) * CYCLE_MINS * 60 - diffSec;
            document.getElementById('nextLimit').textContent = `あと ${String(Math.floor(remainSec / 60)).padStart(2, '0')}:${String(remainSec % 60).padStart(2, '0')}`;
            
            calculateAndDisplay();
        }

        /** 手動課金額増減 */
        function updateManualCharge(value) {
            const absVal = Math.abs(value);
            if (value > 0) counts[absVal]++;
            else if (counts[absVal] > 0) counts[absVal]--;
            document.getElementById(`count${absVal}`).textContent = counts[absVal];
            calculateAndDisplay();
        }

        /** 合計と予測の計算 */
        function calculateAndDisplay() {
            const manualTotal = (counts[600] * 600) + (counts[800] * 800) + (counts[1200] * 1200) + (counts[2000] * 2000);
            const subTotal = currentAutoCharge + manualTotal;
            
            const totalNormal = Math.floor(subTotal * 1.1);
            const totalMidnight = Math.floor(totalNormal * 1.1);
            const predNormal = Math.floor((subTotal + 800) * 1.1);
            const predMidnight = Math.floor(predNormal * 1.1);

            document.getElementById('totalAmount').textContent = `¥${totalNormal.toLocaleString()}(深夜:${totalMidnight.toLocaleString()})`;
            document.getElementById('predictionAmount').textContent = `¥${predNormal.toLocaleString()}(深夜:${predMidnight.toLocaleString()})`;
        }

        calculateAndDisplay();
    </script>
</body>
</html>
